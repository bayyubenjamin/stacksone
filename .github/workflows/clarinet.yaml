name: Repository CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  web:
    name: Web app and SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Run SDK tests
        run: npm test

      - name: Build web application
        run: npm run build

      - name: Verify npm package contents
        run: npm pack --dry-run

  contracts:
    name: Clarity contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart-contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: smart-contracts/package-lock.json

      - name: Install contract test dependencies
        run: npm ci

      - name: Run contract tests
        id: contract-tests
        shell: bash
        run: |
          set +e
          npm test > contract-test.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload contract test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-log
          path: smart-contracts/contract-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce contract test result
        shell: bash
        run: |
          cat contract-test.log
          test "${{ steps.contract-tests.outputs.status }}" -eq 0
